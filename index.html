<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To My KoKo A Thay Lay ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
color:#fff;
text-align:center;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
}

h1{
font-size:42px;
color:#ff4da6;
text-shadow:
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

#message{
margin-top:20px;
font-size:28px;
min-height:80px;
color:white;
}

img{
width:250px;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px hotpink;
margin-top:20px;
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:24px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff4da6;
color:white;
font-size:20px;
cursor:pointer;
}
</style>

</head>

<body>

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>❤️ To My KoKo A Thay Lay ❤️</h1>

<div id="message"></div>

<img id="photo" src="photo1.jpg">

<br>

<button onclick="startLove()">Touch My Heart ❤️</button>

</div>

<script>

const text="အများကြီးချစ်တယ် ❤️ ကိုကိုအသေးလေး ❤️";

let i=0;

function typeWriter(){

if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,100);
}

}

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg"
];

let current=0;

function slide(){

current++;

if(current>=photos.length){
current=0;
}

document.getElementById("photo").src=photos[current];

}

setInterval(slide,2500);

function startLove(){

document.getElementById("bgmusic").play();

typeWriter();

}

function hearts(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(hearts,300);

</script>

</body>
</html>
